site_name: Agent Skill Router
site_description: MCP proxy that discovers and routes agent skills and slash commands across AI coding agents
site_url: https://mariotaddeucci.github.io/agent-skill-router
repo_url: https://github.com/mariotaddeucci/agent-skill-router
repo_name: agent-skill-router
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Supported Agents: agents.md
  - Skills:
      - Writing Skills: skills.md
      - Slash Commands: slash-commands.md
  - Reference:
      - CLI: cli.md
      - Configuration: configuration.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mariotaddeucci/agent-skill-router
